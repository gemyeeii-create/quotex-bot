name: Quotex Bot Run
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # تحديث لنسخة أحدث

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # نسخة مستقرة جداً

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas_ta yfinance flask # أضفنا flask لضمان التوافق

      - name: Run Bot
        run: python main.py
